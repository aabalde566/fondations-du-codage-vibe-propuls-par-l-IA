<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdou - Landing Page</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg-1: #eff6ff;
      --bg-2: #dbeafe;
      --text: #0f172a;
      --muted: #475569;
      --white: #ffffff;
      --shadow: 0 20px 50px rgba(37, 99, 235, 0.18);
      --radius: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.16), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--white) 55%, var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hero {
      width: 100%;
      max-width: 860px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 64px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.08);
      z-index: 0;
    }

    .hero::before {
      width: 220px;
      height: 220px;
      top: -70px;
      left: -70px;
    }

    .hero::after {
      width: 180px;
      height: 180px;
      bottom: -60px;
      right: -50px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .name {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--primary);
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 18px;
    }

    .description {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 32px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 15px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.28);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    .button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 18px 36px rgba(37, 99, 235, 0.34);
      filter: brightness(1.05);
    }

    .button:active {
      transform: translateY(-1px) scale(1.01);
    }

    @media (max-width: 640px) {
      .hero {
        padding: 48px 24px;
        border-radius: 20px;
      }

      .description {
        font-size: 1rem;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="content">
      <h1 class="name">Abdou</h1>
      <p style="color: gray;">Bienvenue sur mon portfolio</p>
      <h2 class="subtitle">Développeur Frontend passionné</h2>
      <p class="description">Je crée des sites web modernes et interactifs</p>
      <a href="#" class="button">Voir mes projets</a>
    </div>
  </main>
</body>
</html>
